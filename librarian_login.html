<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Librarian Login – Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Nunito", sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a1628 0%, #1a2744 45%, #0d1f3c 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated background */
.bg-shapes {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-shapes span {
  position: absolute;
  border-radius: 50%;
  animation: pulse 9s infinite ease-in-out;
}
.bg-shapes span:nth-child(1) {
  width: 380px; height: 380px;
  background: rgba(14,165,233,0.07);
  top: -100px; right: -80px;
  animation-delay: 0s;
}
.bg-shapes span:nth-child(2) {
  width: 250px; height: 250px;
  background: rgba(6,182,212,0.06);
  bottom: 40px; left: -60px;
  animation-delay: 3s;
}
.bg-shapes span:nth-child(3) {
  width: 120px; height: 120px;
  background: rgba(14,165,233,0.1);
  top: 45%; left: 12%;
  animation-delay: 6s;
}
@keyframes pulse {
  0%, 100% { transform: scale(1) translateY(0); opacity: 0.7; }
  50%       { transform: scale(1.08) translateY(-18px); opacity: 1; }
}

.login-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  padding: 24px;
  animation: slideUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(50px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(28px);
  border: 1px solid rgba(14,165,233,0.2);
  border-radius: 26px;
  padding: 44px 40px;
  box-shadow: 0 28px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
}

.logo-area {
  text-align: center;
  margin-bottom: 34px;
}
.logo-icon {
  width: 68px; height: 68px;
  background: linear-gradient(135deg, #0284c7, #0ea5e9);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 30px;
  box-shadow: 0 10px 30px rgba(14,165,233,0.45);
}
.logo-area h1 {
  color: #fff;
  font-size: 25px;
  font-weight: 800;
  margin-bottom: 5px;
}
.logo-area p {
  color: rgba(255,255,255,0.45);
  font-size: 13px;
}
.role-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(14,165,233,0.18);
  border: 1px solid rgba(14,165,233,0.35);
  color: #7dd3fc;
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  margin-top: 10px;
}

.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin-bottom: 7px;
}
.input-wrap { position: relative; }
.input-wrap i {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 14px;
}
.form-input {
  width: 100%;
  padding: 13px 14px 13px 42px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 13px;
  color: #fff;
  font-family: "Nunito", sans-serif;
  font-size: 14px;
  outline: none;
  transition: border 0.2s, background 0.2s;
}
.form-input::placeholder { color: rgba(255,255,255,0.3); }
.form-input:focus {
  border-color: #0ea5e9;
  background: rgba(14,165,233,0.1);
}

.error-msg {
  display: none;
  background: rgba(239,68,68,0.13);
  border: 1px solid rgba(239,68,68,0.28);
  color: #fca5a5;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 16px;
}

.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #0284c7, #0ea5e9);
  color: #fff;
  border: none;
  border-radius: 13px;
  font-family: "Nunito", sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 6px 22px rgba(14,165,233,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-login:hover  { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 10px 28px rgba(14,165,233,0.5); }
.btn-login:active { transform: translateY(0); }

.links-row {
  display: flex;
  justify-content: space-between;
  margin-top: 22px;
  flex-wrap: wrap;
  gap: 8px;
}
.nav-link {
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  text-decoration: none;
  transition: color 0.2s;
}
.nav-link span { color: #38bdf8; font-weight: 700; }
.nav-link:hover { color: rgba(255,255,255,0.7); }

.spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-shapes">
  <span></span><span></span><span></span>
</div>

<div class="login-wrapper">
  <div class="login-card">

    <div class="logo-area">
      <div class="logo-icon">🗂️</div>
      <h1>Library Portal</h1>
      <p>Sign in to your librarian account</p>
      <div class="role-badge"><i class="fas fa-id-badge"></i> Librarian Access</div>
    </div>

    <div id="errorMsg" class="error-msg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid credentials</span>
    </div>

    <div class="form-group">
      <label class="form-label">Email / Username</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="text" id="libEmail" class="form-input" placeholder="Enter your email or username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="libPassword" class="form-input" placeholder="Enter your password">
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="librarianLogin()">
      <span id="btnText"><i class="fas fa-sign-in-alt"></i> Sign In</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="links-row">
      <a href="login.html" class="nav-link">Admin? <span>Login here →</span></a>
      <a href="student_login.html" class="nav-link">Student? <span>Login here →</span></a>
    </div>

  </div>
</div>

<script>
const API = "http://localhost:3000/api";

async function librarianLogin() {
  const email    = document.getElementById("libEmail").value.trim();
  const password = document.getElementById("libPassword").value.trim();
  const errorDiv = document.getElementById("errorMsg");
  const errText  = document.getElementById("errorText");

  errorDiv.style.display = "none";
  if (!email || !password) {
    errText.textContent = "Please fill in both fields";
    errorDiv.style.display = "block";
    return;
  }

  document.getElementById("btnText").style.display = "none";
  document.getElementById("spinner").style.display = "block";
  document.getElementById("loginBtn").disabled = true;

  try {
    const res  = await fetch(`${API}/librarian-login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok && data.success) {
      sessionStorage.setItem("librarianLoggedIn", "true");
      sessionStorage.setItem("librarianName", data.name || email);
      window.location.href = "librarian_dashboard.html";
    } else {
      errText.textContent = data.message || "Invalid email or password";
      errorDiv.style.display = "block";
    }
  } catch (err) {
    errText.textContent = "Cannot connect to server. Make sure node server.js is running.";
    errorDiv.style.display = "block";
  } finally {
    document.getElementById("btnText").style.display = "flex";
    document.getElementById("spinner").style.display = "none";
    document.getElementById("loginBtn").disabled = false;
  }
}

document.addEventListener("keydown", e => { if (e.key === "Enter") librarianLogin(); });
</script>
</body>
</html>
