<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Modal</title>

<link href="https://fonts.googleapis.com/css?family=Nunito:400,600,700" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: "Nunito", sans-serif;
  color: rgba(0,0,0,0.7);
  margin: 0;
}

.container {
  height: 200vh;
  background-image: url(https://images.unsplash.com/photo-1538137524007-21e48fa42f3f);
  background-size: cover;
  background-position: center;
}

.scroll-down {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  font-size: 32px;
  font-weight: 800;
}

.scroll-down svg {
  margin-top: 16px;
  width: 52px;
  fill: currentColor;
}

.modal {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: rgba(51,51,51,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
}

.modal-container {
  display: flex;
  max-width: 720px;
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  position: absolute;
  opacity: 0;
  pointer-events: none;
  background: #fff;
  transform: translateY(100px) scale(0.4);
  transition: 0.3s;
}

.modal-left {
  padding: 60px 30px 20px;
  flex: 1.5;
  opacity: 0;
  transform: translateY(80px);
  transition: 0.5s;
}

.modal-right {
  flex: 2;
}

.modal-right img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(2);
  transition: 1.2s;
}

.modal-title {
  font-size: 26px;
  color: #55311c;
}

.input-block {
  display: flex;
  flex-direction: column;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  margin-bottom: 20px;
}

.input-block input {
  border: none;
  outline: none;
}

.input-label {
  font-size: 11px;
  text-transform: uppercase;
  color: #8c7569;
}

.input-button {
  background: #8c7569;
  color: #fff;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 4px;
}

.modal-button {
  padding: 10px 40px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

.modal-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.icon-button {
  position: absolute;
  right: 10px;
  top: 12px;
  background: none;
  border: none;
  cursor: pointer;
}

.modal.is-open {
  height: 100%;
  background: rgba(51,51,51,0.85);
}

.modal.is-open .modal-container {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

.modal.is-open .modal-left {
  opacity: 1;
  transform: translateY(0);
}

.modal.is-open .modal-right img {
  transform: scale(1);
}

.modal.is-open .modal-button {
  opacity: 0;
}

.error-msg {
  color: red;
  font-size: 13px;
  margin-bottom: 10px;
  display: none;
}

@media(max-width:750px){
  .modal-right {
    display: none;
  }
}
</style>

</head>
<body>

<div class="scroll-down">SCROLL DOWN
  <svg viewBox="0 0 32 32">
    <path d="M16 3C8.83 3 3 8.83 3 16s5.83 13 13 13 13-5.83 13-13S23.17 3 16 3z"/>
  </svg>
</div>

<div class="container"></div>

<div class="modal">
  <div class="modal-container">

    <div class="modal-left">
      <h1 class="modal-title">Welcome Back!</h1>

      <div class="input-block">
        <label class="input-label">Email</label>
        <input type="email" id="loginEmail" placeholder="Email">
      </div>

      <div class="input-block">
        <label class="input-label">Password</label>
        <input type="password" id="loginPassword" placeholder="Password">
      </div>

      <p class="error-msg" id="errorMsg">Invalid email or password</p>

      <div class="modal-buttons">
        <a href="#">Forgot password?</a>
        <button class="input-button" id="loginBtn">Login</button>
      </div>
    </div>

    <div class="modal-right">
      <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=600" alt="Library">
    </div>

    <button class="icon-button close-button">✖</button>

  </div>

  <button class="modal-button">Click here to login</button>
</div>

<script>
// ===============================
// MODAL OPEN/CLOSE
// ===============================
const body = document.body;
const modal = document.querySelector(".modal");
const modalButton = document.querySelector(".modal-button");
const closeButton = document.querySelector(".close-button");
const scrollDown = document.querySelector(".scroll-down");

let isOpened = false;

const openModal = () => {
  modal.classList.add("is-open");
  body.style.overflow = "hidden";
};

const closeModal = () => {
  modal.classList.remove("is-open");
  body.style.overflow = "auto";
};

window.addEventListener("scroll", () => {
  if (window.scrollY > window.innerHeight / 3 && !isOpened) {
    isOpened = true;
    scrollDown.style.display = "none";
    openModal();
  }
});

modalButton.addEventListener("click", openModal);
closeButton.addEventListener("click", closeModal);

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

// ===============================
// LOGIN WITH API
// ===============================
const API = "http://localhost:3000/api";

async function login() {
  let email = document.getElementById("loginEmail").value.trim();
  let password = document.getElementById("loginPassword").value.trim();
  let errorMsg = document.getElementById("errorMsg");

  errorMsg.style.display = "none";

  if (!email || !password) {
    errorMsg.innerText = "Please fill in both fields";
    errorMsg.style.display = "block";
    return;
  }

  try {
    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok && data.success) {
      sessionStorage.setItem("isLoggedIn", "true");
      window.location.href = "index.html";
    } else {
      errorMsg.innerText = data.message || "Invalid email or password";
      errorMsg.style.display = "block";
    }
  } catch (err) {
    errorMsg.innerText = "Cannot connect to server. Make sure node server.js is running.";
    errorMsg.style.display = "block";
  }
}

// Login on button click
document.getElementById("loginBtn").addEventListener("click", login);

// Login on Enter key
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});
</script>

</body>
</html>
